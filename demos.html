<!DOCTYPE html>
<html lang="es">
<head>
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-5EYJR89ETS"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-5EYJR89ETS');</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demos — Poncho Custom Music</title>
  <meta name="description" content="Escucha demos gratuitas de Heavy Metal, Cumbia, Hip Hop y más. Sin descarga.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
  <style>
    #demos-section {
      padding: 3rem 3rem 7rem;
      max-width: 1100px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }

    .filter-bar {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      margin-bottom: 2.5rem;
    }

    .filter-btn {
      padding: 0.45rem 1.1rem;
      font-family: var(--font-label);
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border: 1px solid var(--border);
      color: var(--text-dim);
      background: transparent;
      transition: all var(--transition);
      cursor: none;
    }

    .filter-btn:hover,
    .filter-btn.active {
      border-color: var(--neon-cyan);
      color: var(--neon-cyan);
      background: rgba(0,245,255,0.06);
    }

    .demos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.2rem;
    }

    .demo-card {
      opacity: 1;
      transition: opacity 0.3s, transform 0.3s;
    }

    .demo-card.hidden {
      display: none;
    }

    .demos-empty {
      grid-column: 1/-1;
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-dim);
      font-family: var(--font-label);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
    }

    .demos-loading {
      grid-column: 1/-1;
      display: flex;
      justify-content: center;
      padding: 4rem;
    }

    @media (max-width: 768px) {
      #demos-section { padding: 2rem 1.5rem 6rem; }
      .demos-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 480px) {
      #demos-section { padding: 1.5rem 1rem 5rem; }
    }
  </style>
</head>
<body>

<div id="cursor-dot"></div>
<div id="cursor-ring"></div>

<nav class="main-nav" id="mainNav">
  <a href="index.html" class="nav-logo">PONCHO<span>CUSTOM</span></a>
  <div class="nav-links" id="navLinks">
    <a href="demos.html">Demos</a>
    <a href="solicitar.html">Solicitar Tema</a>
    <a href="admin.html">Admin</a>
  </div>
  <button class="hamburger" id="hamburger" aria-label="Menú">
    <span></span><span></span><span></span>
  </button>
</nav>

<!-- Page Hero -->
<div class="page-hero">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <h1 class="hero-title z2">
    <span style="color:#fff">DEMOS</span>
    <span style="background:linear-gradient(90deg,var(--neon-cyan),var(--neon-purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text"> GRATUITAS</span>
  </h1>
  <p class="hero-sub z2">Escucha ejemplos de lo que podemos hacer para ti. Sin descarga, sin registro.</p>
</div>

<!-- Demos -->
<section id="demos-section">
  <!-- Filters -->
  <div class="filter-bar" id="filterBar">
    <button class="filter-btn active" data-filter="all">Todos</button>
  </div>

  <!-- Grid -->
  <div class="demos-grid" id="demosGrid">
    <div class="demos-loading"><div class="spinner"></div></div>
  </div>
</section>

<!-- Floating CTA -->
<div class="floating-cta">
  <a href="solicitar.html" class="btn-secondary">✦ Solicitar Mi Tema</a>
</div>

<script src="js/supabase-config.js"></script>
<script src="js/main.js"></script>
<script src="js/demos.js"></script>
</body>
</html>
